# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  MatchMind is a 5-agent autonomous recruiting intelligence system. A
  transparent weighted rule-based ranker combines 8 feature dimensions:
  skill match (TF-IDF + proficiency/duration trust discounting), semantic
  similarity (TF-IDF cosine against JD text), experience fit (smooth peak
  at 7 years), product company score (career history analysis), shipped
  system evidence (keyword co-occurrence in role descriptions), location
  fit, behavioral modifier (redrob_signals: recency, response rate, notice
  period, demand signal), and title archetype gating. Honeypot detection
  flags structurally impossible profiles (expert proficiency at 0 months).
  Disqualifier multipliers penalize consulting-only careers, title-chasing
  patterns, and CV/speech-heavy skill lists. Runtime: 71 seconds for all
  100,000 candidates on CPU with no network or GPU dependency.

