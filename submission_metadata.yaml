# ============================================================
# Product
# ============================================================
product_name: "MatchMind"

problem_statement: >
  Redrob's candidate discovery relies on keyword search and opaque
  ranking — missing qualified candidates who describe their work
  differently, rewarding keyword-stuffers, and providing zero
  explanation for why any candidate ranked where they did.

solution_summary: >
  MatchMind is a multi-agent autonomous recruiting intelligence system.
  Five coordinated AI agents (JD Parser, Ranking, Fraud Detection,
  Explanation, Feedback Learning) replace keyword search with semantic
  understanding, transparent explainable ranking, and a continuous
  feedback loop driven by recruiter actions — all running autonomously
  without human intervention.

